<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Squig Model Server</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #080810;
        color: #e0e0e0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
      }
      .splash {
        text-align: center;
        animation: fadeIn 0.5s ease;
      }
      .logo {
        font-size: 3rem;
        font-weight: 800;
        background: linear-gradient(135deg, #6ee7b7, #3b82f6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 1rem;
      }
      .subtitle {
        color: #888;
        font-size: 0.95rem;
        margin-bottom: 2.5rem;
      }
      .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #1a1a2e;
        border-top: 3px solid #6ee7b7;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 1.5rem;
      }
      .status {
        color: #6ee7b7;
        font-size: 0.85rem;
        min-height: 1.2em;
      }
      .error {
        color: #f87171;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="splash">
      <div class="logo">Squig Model Server</div>
      <div class="subtitle">Local AI inference, native performance</div>
      <div class="spinner" id="spinner"></div>
      <div class="status" id="status">Starting backend server...</div>
    </div>

    <script>
      const BACKEND_URL = "http://127.0.0.1:9090";
      const statusEl = document.getElementById("status");
      let attempts = 0;
      const maxAttempts = 120; // 60 seconds at 500ms interval

      async function checkBackend() {
        attempts++;
        try {
          const resp = await fetch(BACKEND_URL + "/api/health", {
            signal: AbortSignal.timeout(2000),
          });
          if (resp.ok) {
            statusEl.textContent = "Server ready! Loading dashboard...";
            setTimeout(() => {
              window.location.replace(BACKEND_URL);
            }, 300);
            return;
          }
        } catch (e) {
          // Server not ready yet
        }

        if (attempts > maxAttempts) {
          statusEl.textContent = "Server failed to start. Check logs.";
          statusEl.classList.add("error");
          document.getElementById("spinner").style.display = "none";
          return;
        }

        // Update status message based on progress
        if (attempts > 20) {
          statusEl.textContent = "Loading model into GPU memory...";
        } else if (attempts > 5) {
          statusEl.textContent = "Initializing inference engine...";
        }

        setTimeout(checkBackend, 500);
      }

      // Listen for backend errors from Tauri
      if (window.__TAURI__) {
        window.__TAURI__.event.listen("backend-error", (event) => {
          statusEl.textContent = "Error: " + event.payload;
          statusEl.classList.add("error");
          document.getElementById("spinner").style.display = "none";
        });
      }

      // Start polling
      setTimeout(checkBackend, 800);
    </script>
  </body>
</html>
