name: Build & Release

on:
  push:
    tags:
      - "model-server/v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. model-server/v0.1.0)"
        required: true

env:
  RELEASE_REPO: hayesjl77/Squig-AI-Releases
  LLAMA_CPP_REF: master

jobs:
  # ─────────────────────────────────────────────────────────────
  # Build Linux (Ubuntu 22.04)
  # ─────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1 \
            cmake \
            ninja-build \
            libfuse2

      - name: Install Vulkan SDK
        run: |
          wget -qO - https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo apt-key add -
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list \
            https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt-get update
          sudo apt-get install -y vulkan-sdk

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: "12.6.3"
          method: "network"
          sub-packages: '["nvcc", "cudart-dev"]'
          non-cuda-sub-packages: '["libcublas-dev"]'

      - name: Clone llama.cpp
        run: git clone --depth 1 --branch ${{ env.LLAMA_CPP_REF }} https://github.com/ggerganov/llama.cpp.git /tmp/llama.cpp

      - name: Build llama.cpp (Vulkan)
        run: |
          cmake -S /tmp/llama.cpp -B /tmp/llama-build-vulkan \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_VULKAN=ON \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_SERVER=ON
          cmake --build /tmp/llama-build-vulkan --target llama-server -j$(nproc)

      - name: Build llama.cpp (CUDA)
        run: |
          cmake -S /tmp/llama.cpp -B /tmp/llama-build-cuda \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_CUDA=ON \
            -DCMAKE_CUDA_ARCHITECTURES="60;70;75;80;86;89;90" \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_SERVER=ON
          cmake --build /tmp/llama-build-cuda --target llama-server -j$(nproc)

      - name: Bundle llama-server backends
        run: |
          mkdir -p src-tauri/llama-backends/vulkan src-tauri/llama-backends/cuda

          cp -L /tmp/llama-build-vulkan/bin/llama-server src-tauri/llama-backends/vulkan/
          for lib in libllama.so libggml.so libggml-base.so libggml-cpu.so libggml-vulkan.so libmtmd.so; do
            if [ -f "/tmp/llama-build-vulkan/bin/$lib" ] || [ -L "/tmp/llama-build-vulkan/bin/$lib" ]; then
              cp -L "/tmp/llama-build-vulkan/bin/$lib" "src-tauri/llama-backends/vulkan/"
            fi
          done
          chmod +x src-tauri/llama-backends/vulkan/llama-server

          cp -L /tmp/llama-build-cuda/bin/llama-server src-tauri/llama-backends/cuda/
          for lib in libllama.so libggml.so libggml-base.so libggml-cpu.so libggml-cuda.so libmtmd.so; do
            if [ -f "/tmp/llama-build-cuda/bin/$lib" ] || [ -L "/tmp/llama-build-cuda/bin/$lib" ]; then
              cp -L "/tmp/llama-build-cuda/bin/$lib" "src-tauri/llama-backends/cuda/"
            fi
          done
          chmod +x src-tauri/llama-backends/cuda/llama-server

          echo "=== Vulkan backend ==="
          ls -lah src-tauri/llama-backends/vulkan/
          echo "=== CUDA backend ==="
          ls -lah src-tauri/llama-backends/cuda/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Build UI
        working-directory: ui
        run: npm run build

      - name: Install Tauri CLI
        run: cargo install tauri-cli@2.5.0 --locked

      - name: Build Tauri (Linux)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NO_STRIP: "true"
        working-directory: src-tauri
        run: cargo tauri build

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/deb/*.deb.sig
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────
  # Build Windows (Server 2022)
  # ─────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vulkan SDK (Windows)
        shell: pwsh
        run: |
          $version = "1.4.304.1"
          $url = "https://sdk.lunarg.com/sdk/download/$version/windows/VulkanSDK-$version-Installer.exe"
          Write-Output "Downloading Vulkan SDK $version..."
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\vulkan-sdk.exe" -UseBasicParsing
          Write-Output "Installing Vulkan SDK..."
          Start-Process -FilePath "$env:TEMP\vulkan-sdk.exe" `
            -ArgumentList "--accept-licenses --default-answer --confirm-command install" `
            -Wait -NoNewWindow
          $sdkPath = "C:\VulkanSDK\$version"
          Write-Output "VULKAN_SDK=$sdkPath"
          echo "VULKAN_SDK=$sdkPath" >> $env:GITHUB_ENV
          echo "$sdkPath\Bin" >> $env:GITHUB_PATH
          # Verify the install
          Get-ChildItem $sdkPath -Depth 0

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: "12.6.3"
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "visual_studio_integration"]'

      - name: Clone llama.cpp
        run: git clone --depth 1 --branch ${{ env.LLAMA_CPP_REF }} https://github.com/ggerganov/llama.cpp.git C:\llama-cpp

      - name: Build llama.cpp (Vulkan)
        shell: pwsh
        run: |
          Write-Output "VULKAN_SDK=$env:VULKAN_SDK"
          cmake -S C:\llama-cpp -B C:\llama-build-vulkan `
            -DCMAKE_BUILD_TYPE=Release `
            -DGGML_VULKAN=ON `
            -DLLAMA_BUILD_EXAMPLES=OFF `
            -DLLAMA_BUILD_TESTS=OFF `
            -DLLAMA_BUILD_SERVER=ON
          cmake --build C:\llama-build-vulkan --config Release --target llama-server -j $env:NUMBER_OF_PROCESSORS

      - name: Build llama.cpp (CUDA)
        shell: pwsh
        run: |
          cmake -S C:\llama-cpp -B C:\llama-build-cuda `
            -DCMAKE_BUILD_TYPE=Release `
            -DGGML_CUDA=ON `
            -DCMAKE_CUDA_ARCHITECTURES="60;70;75;80;86;89;90" `
            -DLLAMA_BUILD_EXAMPLES=OFF `
            -DLLAMA_BUILD_TESTS=OFF `
            -DLLAMA_BUILD_SERVER=ON
          cmake --build C:\llama-build-cuda --config Release --target llama-server -j $env:NUMBER_OF_PROCESSORS

      - name: Bundle llama-server backends
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri\llama-backends\vulkan
          New-Item -ItemType Directory -Force -Path src-tauri\llama-backends\cuda

          $vulkanBin = "C:\llama-build-vulkan\bin\Release"
          if (-not (Test-Path "$vulkanBin\llama-server.exe")) { $vulkanBin = "C:\llama-build-vulkan\bin" }
          Copy-Item "$vulkanBin\llama-server.exe" src-tauri\llama-backends\vulkan\
          Get-ChildItem "$vulkanBin\*.dll" | Copy-Item -Destination src-tauri\llama-backends\vulkan\

          $cudaBin = "C:\llama-build-cuda\bin\Release"
          if (-not (Test-Path "$cudaBin\llama-server.exe")) { $cudaBin = "C:\llama-build-cuda\bin" }
          Copy-Item "$cudaBin\llama-server.exe" src-tauri\llama-backends\cuda\
          Get-ChildItem "$cudaBin\*.dll" | Copy-Item -Destination src-tauri\llama-backends\cuda\

          Write-Output "=== Vulkan backend ==="
          Get-ChildItem src-tauri\llama-backends\vulkan\
          Write-Output "=== CUDA backend ==="
          Get-ChildItem src-tauri\llama-backends\cuda\

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Build UI
        working-directory: ui
        run: npm run build

      - name: Install Tauri CLI
        run: cargo install tauri-cli@2.5.0 --locked

      - name: Build Tauri (Windows)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        working-directory: src-tauri
        run: cargo tauri build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────
  # Create release on Squig-AI-Releases repo
  # ─────────────────────────────────────────────────────────────
  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Determine tag and version
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FULL_TAG="${{ inputs.tag }}"
          else
            FULL_TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${FULL_TAG#model-server/v}"
          echo "tag=${FULL_TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Generate latest.json for Tauri updater
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${{ steps.tag.outputs.version }}"
          ENCODED_TAG=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${TAG}', safe=''))")
          REPO_URL="https://github.com/${{ env.RELEASE_REPO }}/releases/download/${ENCODED_TAG}"

          APPIMAGE_SIG=$(cat artifacts/linux-artifacts/src-tauri/target/release/bundle/appimage/*.AppImage.sig 2>/dev/null || echo "")
          NSIS_SIG=$(cat artifacts/windows-artifacts/src-tauri/target/release/bundle/nsis/*.nsis.zip.sig 2>/dev/null || echo "")

          APPIMAGE_FILE=$(find artifacts -name "*.AppImage" ! -name "*.sig" -print -quit)
          NSIS_FILE=$(find artifacts -name "*.nsis.zip" ! -name "*.sig" -print -quit)

          APPIMAGE_NAME=$(basename "$APPIMAGE_FILE" | sed 's/ /./g')
          NSIS_NAME=$(basename "$NSIS_FILE" | sed 's/ /./g')

          cat > latest.json <<ENDJSON
          {
            "version": "${VERSION}",
            "notes": "Squig Model Server v${VERSION}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "linux-x86_64": {
                "signature": "${APPIMAGE_SIG}",
                "url": "${REPO_URL}/${APPIMAGE_NAME}"
              },
              "windows-x86_64": {
                "signature": "${NSIS_SIG}",
                "url": "${REPO_URL}/${NSIS_NAME}"
              }
            }
          }
          ENDJSON

          cat latest.json

      - name: Collect release files
        run: |
          mkdir -p release-files
          find artifacts -type f \( \
            -name "*.deb" -o \
            -name "*.deb.sig" -o \
            -name "*.AppImage" -o \
            -name "*.AppImage.sig" -o \
            -name "*.exe" -o \
            -name "*.msi" -o \
            -name "*.nsis.zip" -o \
            -name "*.nsis.zip.sig" \
          \) -exec cp {} release-files/ \;
          cp latest.json release-files/
          ls -la release-files/

      - name: Create GitHub Release on Squig-AI-Releases
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.RELEASE_REPO }}
          token: ${{ secrets.RELEASE_TOKEN }}
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Squig Model Server v${{ steps.tag.outputs.version }}"
          body: |
            ## Squig Model Server v${{ steps.tag.outputs.version }}

            Run local LLMs with a built-in model manager and OpenAI-compatible API.
            Includes bundled llama.cpp backends for CUDA (NVIDIA) and Vulkan (AMD/Intel/NVIDIA).

            ### Downloads

            **Windows**
            - `.exe` — NSIS installer (recommended)

            **Linux**
            - `.deb` — Debian/Ubuntu package (recommended)
            - `.AppImage` — Universal Linux (run anywhere)

            ### Bundled Backends
            - **CUDA** — Best performance for NVIDIA GPUs (requires NVIDIA drivers)
            - **Vulkan** — Universal GPU support (AMD, Intel, NVIDIA)

            ### Auto-Update
            Existing installations will detect this update automatically.
          draft: false
          prerelease: false
          files: release-files/*
